<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06060e">
  <title>Lirik — MusixLyric Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/player.css">
  <link rel="stylesheet" href="../assets/css/animations.css">

  <style>
    /* ── Lyrics Page Specific ── */
    .lyrics-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }

    .lyrics-page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: var(--transition);
      margin-bottom: 28px;
    }

    .back-btn:hover { color: var(--accent); }

    .lyrics-page-cover {
      width: 160px;
      height: 160px;
      border-radius: 20px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card), var(--shadow-glow2);
    }

    .lyrics-page-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .lyrics-page-artist {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .lyrics-page-body {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
    }

    .lyrics-page-body .lyric-line {
      font-size: 1rem;
      padding: 10px 16px;
      margin: 4px 0;
    }

    .search-form {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .search-form input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 10px 18px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition);
    }

    .search-form input:focus {
      border-color: var(--border-accent);
    }

    .search-form button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-pill);
      padding: 10px 20px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .search-form button:hover {
      background: #1fffa8;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .lyrics-meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .lyrics-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .lyrics-action-row {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>

<div class="ambient-blob"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="nav-logo" href="../index.html">
    <div class="logo-icon"><i class="fas fa-wave-square"></i></div>
    <span class="logo-text">MusixLyric</span>
  </a>
  <div class="nav-right">
    <a href="../index.html" style="color:var(--text-muted);font-size:0.8rem;text-decoration:none;display:flex;align-items:center;gap:6px">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
  </div>
</nav>

<!-- MAIN -->
<div class="lyrics-page">

  <!-- Search Form -->
  <div class="search-form fade-up">
    <input type="text" id="lyricSearchInput" placeholder="Cari lirik: judul + artis..." autocomplete="off">
    <button id="lyricSearchBtn"><i class="fas fa-search"></i> Cari</button>
  </div>

  <!-- Result -->
  <div id="lyricResult" style="display:none" class="fade-up-delay">

    <div class="lyrics-page-header">
      <img id="lyrCover" class="lyrics-page-cover" src="" alt="cover">
      <div id="lyrTitle" class="lyrics-page-title">—</div>
      <div id="lyrArtist" class="lyrics-page-artist">—</div>
    </div>

    <div class="lyrics-page-body">
      <div class="lyrics-meta-bar">
        <span class="lyrics-label"><i class="fas fa-align-left"></i> Lirik</span>
        <div class="lyrics-action-row">
          <button class="modal-btn copy-btn" id="lyrCopyBtn" style="font-size:0.72rem">
            <i class="fas fa-copy"></i> Salin
          </button>
        </div>
      </div>
      <div id="lyricsContent">
        <div class="loading-state">
          <div class="spin-ring"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Empty -->
  <div id="lyrEmptyState" class="empty-state fade-in">
    <div class="waveform-idle">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <span class="empty-icon"><i class="fas fa-file-lines"></i></span>
    <h3>Cari lirik lagu</h3>
    <p>Masukkan judul dan nama artis untuk menemukan lirik</p>
  </div>

</div>

<script type="module">
import { fetchLyrics, searchTracks } from '../assets/js/api.js';

const searchInput = document.getElementById('lyricSearchInput');
const searchBtn   = document.getElementById('lyricSearchBtn');
const resultEl    = document.getElementById('lyricResult');
const emptyEl     = document.getElementById('lyrEmptyState');
const coverEl     = document.getElementById('lyrCover');
const titleEl     = document.getElementById('lyrTitle');
const artistEl    = document.getElementById('lyrArtist');
const contentEl   = document.getElementById('lyricsContent');
const copyBtn     = document.getElementById('lyrCopyBtn');

let currentPlain = '';

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;

  emptyEl.style.display = 'none';
  resultEl.style.display = 'block';
  contentEl.innerHTML = '<div class="loading-state"><div class="spin-ring"></div><p class="loading-text">Mencari...</p></div>';
  titleEl.textContent = q;
  artistEl.textContent = '—';
  coverEl.src = 'https://placehold.co/160x160/131525/00e5a0?text=♪';

  // Try to get cover from Spotify search
  try {
    const tracks = await searchTracks(q);
    if (tracks.length > 0) {
      const t = tracks[0];
      coverEl.src    = t.cover || coverEl.src;
      titleEl.textContent  = t.name   || t.title   || q;
      artistEl.textContent = t.artists || t.artist  || '';
    }
  } catch (_) {}

  const title  = titleEl.textContent;
  const artist = artistEl.textContent;

  const result = await fetchLyrics(title, artist);
  if (result && result.plainLyrics) {
    currentPlain = result.plainLyrics;
    contentEl.innerHTML = result.plainLyrics.split('\n')
      .map(l => `<div class="lyric-line">${escHtml(l) || '<br>'}</div>`)
      .join('');
  } else {
    currentPlain = '';
    contentEl.innerHTML = '<div class="loading-state"><i class="fas fa-music" style="font-size:1.5rem;opacity:0.2;color:var(--accent)"></i><p class="loading-text">Lirik tidak ditemukan</p></div>';
  }
}

copyBtn.addEventListener('click', () => {
  if (!currentPlain) return;
  navigator.clipboard.writeText(currentPlain).then(() => showToast('✅ Lirik tersalin!'));
});

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = Object.assign(document.createElement('div'), { className: 'toast', textContent: msg });
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => el.remove(), 2600);
}

function escHtml(s) {
  return String(s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
}
</script>

</body>
</html>
