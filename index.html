<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06060e">
  <title>MusixLyric Pro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/player.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

<!-- Ambient -->
<div class="ambient-blob"></div>

<!-- ── NAVBAR ───────────────────────── -->
<nav class="navbar">
  <a class="nav-logo" href="index.html">
    <div class="logo-icon"><i class="fas fa-wave-square"></i></div>
    <span class="logo-text">MusixLyric</span>
  </a>
  <div class="nav-right">
    <div class="nav-badge">
      <span class="live-dot"></span>
      LIVE
    </div>
  </div>
</nav>

<!-- ── MAIN CONTENT ─────────────────── -->
<div class="container">

  <!-- Hero -->
  <header class="hero fade-up">
    <div class="hero-eyebrow">
      <i class="fas fa-music" style="font-size:0.6rem"></i>
      Streaming · Lirik · Download
    </div>
    <h1>
      Dengerin musik,<br>
      <span class="gradient-text">rasain liriknya.</span>
    </h1>
    <p>Cari jutaan lagu, putar langsung, dan nikmati lirik yang sync otomatis.</p>
  </header>

  <!-- Search -->
  <div class="search-wrapper fade-up-delay" style="animation-delay:0.15s">
    <div class="search-bar">
      <i class="fas fa-magnifying-glass search-icon"></i>
      <input
        type="text"
        id="searchInput"
        placeholder="Cari judul lagu atau artis..."
        autocomplete="off"
        spellcheck="false"
      >
      <button class="search-btn" id="searchBtn">
        <i class="fas fa-search"></i> Cari
      </button>
    </div>
  </div>

  <!-- Artist Chips -->
  <div id="artistChips" class="artist-chips" style="display:none"></div>

  <!-- Results -->
  <section id="resultArea" style="display:none">
    <div class="section-header">
      <div class="section-title" id="resultTitle"></div>
      <div class="result-count" id="resultCount"></div>
    </div>
    <div id="musicGrid" class="music-grid"></div>
  </section>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state fade-in">
    <div class="waveform-idle">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <span class="empty-icon"><i class="fas fa-headphones"></i></span>
    <h3>Mulai cari lagu favoritmu</h3>
    <p>Ketik judul lagu, nama artis, atau genre kesukaan kamu</p>
  </div>

</div>

<!-- ── PLAYER BAR ────────────────────── -->
<div id="playerBar" class="player-bar">

  <!-- Track Info -->
  <div class="player-track" id="playerTrackInfo">
    <div class="player-thumb-wrap">
      <img id="playerThumb" class="player-thumb" src="" alt="cover">
      <div class="playing-ring"></div>
    </div>
    <div class="player-meta">
      <div id="playerSongName" class="player-song-name">—</div>
      <div id="playerArtistName" class="player-artist-name">—</div>
    </div>
  </div>

  <!-- EQ Bars -->
  <div class="eq-bars">
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
  </div>

  <!-- Controls -->
  <div class="player-controls">
    <button class="ctrl-btn" id="prevBtn" aria-label="Lagu sebelumnya">
      <i class="fas fa-backward-step"></i>
    </button>
    <button class="ctrl-btn play-btn" id="playPauseBtn" aria-label="Play / Pause">
      <i class="fas fa-play"></i>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="Lagu berikutnya">
      <i class="fas fa-forward-step"></i>
    </button>
  </div>

  <!-- Progress -->
  <div class="player-progress">
    <span id="currentTime" class="time-label">0:00</span>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span id="durationTime" class="time-label">0:00</span>
  </div>

  <!-- Actions -->
  <div class="player-actions">
    <button class="action-btn lyrics-btn" id="lyricsBtn">
      <i class="fas fa-align-left"></i>
      <span>Lirik</span>
    </button>
    <a class="action-btn download-btn" id="downloadBtn" href="#" download>
      <i class="fas fa-arrow-down"></i>
      <span>MP3</span>
    </a>
  </div>

</div>

<!-- ── LYRICS MODAL ──────────────────── -->
<div id="lyricsModal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-panel">

    <div class="modal-header">
      <div class="modal-track-info">
        <div id="modalSongName" class="modal-song-title">—</div>
        <div id="modalArtist" class="modal-artist-name">—</div>
      </div>
      <button id="modalClose" class="modal-close-btn" aria-label="Tutup">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <div class="modal-actions">
      <button id="copyBtn" class="modal-btn copy-btn">
        <i class="fas fa-copy"></i> Salin Lirik
      </button>
      <button id="retryBtn" class="modal-btn retry-btn">
        <i class="fas fa-rotate-right"></i> Cari Lagi
      </button>
    </div>

    <div id="lyricsScroll" class="lyrics-scroll">
      <div class="loading-state">
        <div class="spin-ring"></div>
        <p class="loading-text">Putar lagu dulu...</p>
      </div>
    </div>

  </div>
</div>

<!-- ── SCRIPTS ───────────────────────── -->
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
